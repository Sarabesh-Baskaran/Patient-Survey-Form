<!DOCTYPE html>
<html>
<head>
<title>Patient Survey</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-box">

<h2>Patient Survey Form</h2>

<form id="patientForm">

<input type="text" id="name" placeholder="Patient Name" required><br><br>

<input type="number" id="age" placeholder="Age" required><br><br>

<input type="text" id="gender" placeholder="Gender" required><br><br>

<input type="text" id="phoneNumber" placeholder="Phone Number" required><br><br>

<input type="text" id="disease" placeholder="Symptoms" required><br><br>

<input type="text" id="city" placeholder="City" required><br><br>

<button type="submit">Submit</button>

</form>

</div>



<script type="module" src="script.js"></script>

</body>
</html>
